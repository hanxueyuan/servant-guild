# ServantGuild Helm Values
# Default values for the Helm chart

# ===========================================================================
# Global Settings
# ===========================================================================
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# ===========================================================================
# Application Settings
# ===========================================================================
replicaCount: 3

image:
  repository: servant-guild
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# ===========================================================================
# Service Configuration
# ===========================================================================
service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090
  annotations: {}

# ===========================================================================
# Ingress Configuration
# ===========================================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: api.servantguild.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: servant-guild-tls
      hosts:
        - api.servantguild.dev

# ===========================================================================
# Resource Limits
# ===========================================================================
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# ===========================================================================
# Autoscaling
# ===========================================================================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ===========================================================================
# Node Selection
# ===========================================================================
nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: servant-guild
          topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: servant-guild

# ===========================================================================
# Health Checks
# ===========================================================================
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# ===========================================================================
# Configuration
# ===========================================================================
config:
  logLevel: info
  rustBacktrace: "1"
  
  server:
    host: "0.0.0.0"
    port: 8080
    metricsPort: 9090
    
  runtime:
    wasmMemoryLimitMb: 512
    wasmTimeLimitSecs: 60
    sandboxEnabled: true
    
  consensus:
    votingTimeoutSecs: 3600
    normalQuorum: 3
    criticalQuorum: 5
    
  evolution:
    autoEvolve: false
    requireHumanApproval: true

# ===========================================================================
# Secrets
# ===========================================================================
secrets:
  # Reference existing secret
  existingSecret: ""
  
  # Or create new secret
  create: true
  data:
    githubToken: ""
    llmApiKeys: "{}"

# ===========================================================================
# PostgreSQL (Bitnami Chart)
# ===========================================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: "postgres"
    username: "servant"
    password: "servant"
    database: "servant_guild"
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# ===========================================================================
# Redis (Bitnami Chart)
# ===========================================================================
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 64Mi

# ===========================================================================
# Observability
# ===========================================================================
observability:
  # Prometheus
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 10s
      
  # Grafana
  grafana:
    enabled: true
    adminPassword: "admin"
    
  # Loki (logs)
  loki:
    enabled: true
    
  # Jaeger (tracing)
  jaeger:
    enabled: true

# ===========================================================================
# Canary Deployment (for production)
# ===========================================================================
canary:
  enabled: false
  weight: 10
  stepWeight: 10
  stepWeights:
    - 10
    - 30
    - 50
    - 100
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 100
    metrics:
      - name: request-success-rate
        thresholdRange:
          min: 99
        interval: 1m
      - name: request-duration
        thresholdRange:
          max: 500
        interval: 1m

# ===========================================================================
# Pod Disruption Budget
# ===========================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ===========================================================================
# Priority Class
# ===========================================================================
priorityClassName: ""

# ===========================================================================
# Environment
# ===========================================================================
environment: production

# ===========================================================================
# Extra Resources
# ===========================================================================
extraResources: []
