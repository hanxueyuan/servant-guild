# ServantGuild CI/CD Pipeline
# Multi-stage pipeline for build, test, and deploy

name: ServantGuild CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # Code Quality Checks
  # ===========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Check formatting
        run: cargo fmt --all -- --check
        
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ===========================================================================
  # Security Audit
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-audit
        run: cargo install cargo-audit
        
      - name: Run security audit
        run: cargo audit
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================================================================
  # Build & Test
  # ===========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Install wasm-tools
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-opt
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Build
        run: cargo build --release --verbose
        
      - name: Run tests
        run: cargo test --release --verbose
        
      - name: Run integration tests
        run: cargo test --release --test '*' --verbose || true
        
      - name: Generate coverage report
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --out Xml --output-dir ./coverage
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Build Wasm Modules
  # ===========================================================================
  wasm:
    name: Build Wasm Modules
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Build Wasm modules
        run: |
          cargo build --release --target wasm32-unknown-unknown
          
      - name: Optimize Wasm modules
        run: |
          for file in target/wasm32-unknown-unknown/release/*.wasm; do
            wasm-opt -Oz "$file" -o "${file%.wasm}.opt.wasm"
          done
          
      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wasm-modules
          path: target/wasm32-unknown-unknown/release/*.opt.wasm

  # ===========================================================================
  # Docker Build
  # ===========================================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, wasm]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Wasm artifacts
        uses: actions/download-artifact@v3
        with:
          name: wasm-modules
          path: target/wasm/
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.sha }}

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.servantguild.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Install helm
        uses: azure/setup-helm@v3
        
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name servant-guild-staging --region us-east-1
          
      - name: Deploy with Helm
        run: |
          helm upgrade --install servant-guild ./deploy/helm \
            --namespace servant-guild \
            --create-namespace \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/servant-guild \
            --set image.tag=${{ github.sha }} \
            --set environment=staging \
            --values ./deploy/helm/values-staging.yaml
            
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/servant-guild -n servant-guild --timeout=300s
          
      - name: Run smoke tests
        run: |
          kubectl port-forward svc/servant-guild 8080:8080 -n servant-guild &
          sleep 10
          curl -f http://localhost:8080/health || exit 1

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.servantguild.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        
      - name: Install helm
        uses: azure/setup-helm@v3
        
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name servant-guild-production --region us-east-1
          
      - name: Create release tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "v$(date +%Y%m%d%H%M)" -m "Release $(date +%Y-%m-%d)"
          git push origin --tags || true
          
      - name: Deploy with Helm (canary)
        run: |
          helm upgrade --install servant-guild ./deploy/helm \
            --namespace servant-guild \
            --create-namespace \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/servant-guild \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --values ./deploy/helm/values-production.yaml
            
      - name: Monitor canary deployment
        run: |
          # Monitor metrics for 5 minutes
          for i in {1..5}; do
            echo "Monitoring canary deployment... ($i/5)"
            sleep 60
          done
          
      - name: Promote to full deployment
        run: |
          helm upgrade --install servant-guild ./deploy/helm \
            --namespace servant-guild \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/servant-guild \
            --set image.tag=${{ github.sha }} \
            --set environment=production \
            --set canary.enabled=false \
            --values ./deploy/helm/values-production.yaml
            
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/servant-guild -n servant-guild --timeout=600s
          kubectl get pods -n servant-guild
          
      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          fields: repo,message,commit,author,action,eventName,ref,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          
      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          fields: repo,message,commit,author,action,eventName,ref,workflow
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ===========================================================================
  # Infrastructure Deployment (Terraform)
  # ===========================================================================
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Terraform Init
        run: |
          cd deploy/terraform
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          
      - name: Terraform Plan
        run: |
          cd deploy/terraform
          terraform plan -out=tfplan -var-file="terraform.tfvars"
          
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          cd deploy/terraform
          terraform apply -auto-approve tfplan
